name: CI/CD for EC2 Deployment

on:
  push:
    branches:
      - develop  # 'develop' 브랜치에 푸시될 때마다 실행
  workflow_dispatch: # 수동으로 워크플로우 실행 가능

env:
  EC2_HOST: ${{ secrets.EC2_HOST }}            # EC2 퍼블릭 IP
  EC2_USER: ${{ secrets.EC2_USER }}            # EC2 사용자명 (ubuntu 또는 ec2-user 등)
  SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }} # EC2 SSH Private Key

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout 코드
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Maven을 사용하여 Spring Boot 애플리케이션 빌드
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 3. SSH로 EC2 서버에 배포
      - name: Deploy to EC2
        run: |
          # SSH Key 설정
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          # EC2에 배포: 빌드된 JAR 파일을 EC2로 복사하고 실행
          scp -i private_key.pem target/*.jar $EC2_USER@$EC2_HOST:/home/$EC2_USER/
          
          # EC2에서 JAR 파일 실행
          ssh -i private_key.pem $EC2_USER@$EC2_HOST "nohup java -jar /home/$EC2_USER/*.jar > output.log 2>&1 &"
