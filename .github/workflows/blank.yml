name: CI/CD for EC2 Deployment

on:
  push:
    branches:
      - develop  # 'develop' 브랜치에 푸시될 때마다 실행
      - feature/*  # 'feature' 브랜치에 푸시될 때도 실행
  workflow_dispatch: # 수동으로 워크플로우 실행 가능

env:
  EC2_HOST: ${{ secrets.EC2_HOST }}            # EC2 퍼블릭 IP
  EC2_USER: ${{ secrets.EC2_USER }}            # EC2 사용자명 (ubuntu 또는 ec2-user 등)
  SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }} # EC2 SSH Private Key

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout 코드
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Gradle 빌드를 위한 환경변수 설정 (기본적으로 'staging' 환경으로 설정)
      - name: Set environment variables for feature branch
        run: |
          if [[ $GITHUB_REF == 'refs/heads/feature/*' ]]; then
            echo "APP_ENV=staging" >> $GITHUB_ENV
          fi

      # 3. Gradle 빌드 명령어 실행
      - name: Build with Gradle
        run: ./gradlew build --no-daemon  # Gradle 빌드 명령어

      # 4. EC2 서버에 배포
      - name: Deploy to EC2
        run: |
          # SSH Key 설정
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          # EC2에 배포: 빌드된 JAR 파일을 EC2로 복사하고 실행
          scp -i private_key.pem build/libs/*.jar $EC2_USER@$EC2_HOST:/home/$EC2_USER/
          
          # EC2에서 JAR 파일 실행
          ssh -i private_key.pem $EC2_USER@$EC2_HOST "nohup java -jar /home/$EC2_USER/*.jar > output.log 2>&1 &"
