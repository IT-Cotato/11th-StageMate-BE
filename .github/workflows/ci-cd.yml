name: Deploy to EC2 on develop

on:
  push:
    branches:
      - develop  # ✅ develop 브랜치에 push될 때만 실행
  workflow_dispatch:  # 수동 실행도 허용 (선택)

env:
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}
  SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Deploy to EC2
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          scp -i private_key.pem build/libs/*.jar $EC2_USER@$EC2_HOST:/home/$EC2_USER/
          ssh -i private_key.pem $EC2_USER@$EC2_HOST "nohup java -jar /home/$EC2_USER/*.jar > output.log 2>&1 &"
